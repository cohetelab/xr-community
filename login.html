<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · XR 커뮤니티</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/pages.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="XR 커뮤니티 홈">
        <svg class="brand-mark" width="30" height="30" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="2" y="9" width="28" height="14" rx="7" fill="currentColor"/>
          <circle cx="11" cy="16" r="3.4" fill="#fff"/><circle cx="21" cy="16" r="3.4" fill="#fff"/>
        </svg>
        <span class="brand-name">XR <b>커뮤니티</b></span>
      </a>
      <div class="header-actions">
        <a href="index.html" class="btn btn-ghost">홈으로</a>
      </div>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <svg width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="2" y="9" width="28" height="14" rx="7" fill="currentColor"/>
          <circle cx="11" cy="16" r="3.4" fill="#fff"/><circle cx="21" cy="16" r="3.4" fill="#fff"/>
        </svg>
        <span class="brand-name">XR <b>커뮤니티</b></span>
      </div>
      <p class="auth-sub">XR 사용자들과 경험을 나누세요</p>

      <div class="auth-tabs" data-authtabs>
        <button class="auth-tab is-active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="signup">회원가입</button>
      </div>

      <!-- 로그인 -->
      <form class="auth-form is-active" data-form="login">
        <div>
          <label for="li-email">이메일</label>
          <input id="li-email" class="field" type="email" placeholder="you@example.com" autocomplete="email" />
          <div class="field-error" data-err></div>
        </div>
        <div>
          <label for="li-pw">비밀번호</label>
          <input id="li-pw" class="field" type="password" placeholder="비밀번호" autocomplete="current-password" />
          <div class="field-error" data-err></div>
        </div>
        <div class="auth-row">
          <label class="checkline"><input type="checkbox" /> 로그인 유지</label>
          <a href="#" class="auth-link">비밀번호를 잊으셨나요?</a>
        </div>
        <button type="submit" class="btn btn-primary">로그인</button>

        <div class="divider">또는</div>
        <div class="social">
          <button type="button" class="social-btn">🟦 Google로 계속하기</button>
          <button type="button" class="social-btn kakao">💬 카카오로 계속하기</button>
        </div>
      </form>

      <!-- 회원가입 -->
      <form class="auth-form" data-form="signup">
        <div>
          <label for="su-email">이메일</label>
          <input id="su-email" class="field" type="email" placeholder="you@example.com" autocomplete="email" />
          <div class="field-error" data-err></div>
        </div>
        <div>
          <label for="su-nick">닉네임</label>
          <input id="su-nick" class="field" type="text" placeholder="커뮤니티에서 사용할 이름" maxlength="20" />
          <div class="field-error" data-err></div>
        </div>
        <div>
          <label for="su-pw">비밀번호</label>
          <input id="su-pw" class="field" type="password" placeholder="8자 이상" autocomplete="new-password" />
          <div class="field-error" data-err></div>
        </div>
        <div>
          <label for="su-pw2">비밀번호 확인</label>
          <input id="su-pw2" class="field" type="password" placeholder="비밀번호 다시 입력" autocomplete="new-password" />
          <div class="field-error" data-err></div>
        </div>
        <label class="checkline"><input type="checkbox" data-agree /> <span><a href="#" class="auth-link">이용약관</a> 및 <a href="#" class="auth-link">개인정보처리방침</a>에 동의합니다.</span></label>
        <button type="submit" class="btn btn-primary">회원가입</button>
      </form>

      <p class="auth-foot">© 2026 XR 커뮤니티 (Demo)</p>
    </div>
  </div>

  <script src="assets/auth.js" defer></script>
</body>
</html>
